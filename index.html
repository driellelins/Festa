<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

input{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

button{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

#reader{
width:100%;
margin-top:20px;
display:none;
}

#box{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h2>🎟️ Check-in Festa</h2>

<input id="codigo" placeholder="Digite o código">

<button onclick="validarManual()">✔ Validar manual</button>

<button onclick="startCamera()">📷 Escanear QR</button>

<div id="reader"></div>

<div id="box"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwxok7oB1YSPcT0W0EUVwv0S8Z0jGqSEOOZywAN2tcFjhetV3BdXe4dw1BwWBZvrAtjuw/exec";

function mostrar(msg){
document.getElementById("box").innerHTML = msg;
}

// ======================
// MANUAL
// ======================
function validarManual(){
const code = document.getElementById("codigo").value;
validar(code);
}

// ======================
// CÂMERA (FORÇADA TRASEIRA)
// ======================
function startCamera(){

document.getElementById("reader").style.display = "block";

const qr = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

let cameraId = devices.find(d =>
(d.label || "").toLowerCase().includes("back") ||
(d.label || "").toLowerCase().includes("traseira") ||
(d.label || "").toLowerCase().includes("environment")
)?.id || devices[0].id;

qr.start(
cameraId,
{ fps: 10, qrbox: 250 },
async (text) => {

try {
await qr.stop();
} catch(e){}

document.getElementById("codigo").value = text;

validar(text);

}
);

});

}

// ======================
// API (VERSÃO 100% ESTÁVEL)
// ======================
function validar(code){

mostrar("⏳ Verificando...");

fetch("https://SEU_WORKER.workers.dev/?codigo=" + code)
.then(r => r.json())
.then(res => {

  if(res.status === "OK"){
    mostrar("🟢 LIBERADO");
  }

  if(res.status === "NEGADO"){
    mostrar("🔴 JÁ ENTROU");
  }

  if(res.status === "INVALIDO"){
    mostrar("❌ INVÁLIDO");
  }

});
.then(r => r.json())
.then(res => {

  if(res.status === "OK"){
    mostrar("🟢 LIBERADO");
  }

  if(res.status === "NEGADO"){
    mostrar("🔴 JÁ ENTROU");
  }

  if(res.status === "INVALIDO"){
    mostrar("❌ INVÁLIDO");
  }

});
}

</script>

</body>
</html>

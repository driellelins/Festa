<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
}

input{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

button{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

#reader{
width:100%;
margin-top:20px;
display:none;
}

#box{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🎟️ Check-in Festa</h2>

<!-- 🔹 DIGITAÇÃO MANUAL -->
<input id="codigo" placeholder="Digite o código">

<button onclick="validarManual()">✔ Validar manual</button>

<!-- 🔹 ABRIR CÂMERA -->
<button onclick="startCamera()">📷 Escanear QR</button>

<div id="reader"></div>

<div id="box"></div>

<script>

const API = "COLE_AQUI_SUA_URL_DO_SCRIPT";

function mostrar(msg){
document.getElementById("box").innerHTML = msg;
}

// ======================
// MANUAL
// ======================
function validarManual(){

const code = document.getElementById("codigo").value;

validar(code);

}

// ======================
// CÂMERA
// ======================
function startCamera(){

document.getElementById("reader").style.display = "block";

const qr = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

const cameraId = devices[0].id;

// ⚠️ força câmera traseira
qr.start(
cameraId,
{
fps:10,
qrbox:250
},

(text) => {

qr.stop();

document.getElementById("codigo").value = text;

validar(text);

}

);

});

}

// ======================
// CHAMADA API
// ======================
function validar(code){

mostrar("⏳ Verificando...");

fetch(API + "?codigo=" + encodeURIComponent(code))
.then(r => r.json())
.then(res => {

if(res.status === "OK"){

mostrar("🟢 LIBERADO<br>" + res.nome);

}else if(res.status === "NEGADO"){

mostrar("🔴 JÁ ENTROU");

}else{

mostrar("❌ INVÁLIDO");

}

})
.catch(err => {

mostrar("Erro na conexão");

});

}

</script>

</body>
</html>

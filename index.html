<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
}

input{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

button{
width:95%;
padding:15px;
font-size:18px;
margin-top:10px;
}

#reader{
width:100%;
margin-top:20px;
display:none;
}

#box{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🎟️ Check-in Festa</h2>

<!-- 🔹 DIGITAÇÃO MANUAL -->
<input id="codigo" placeholder="Digite o código">

<button onclick="validarManual()">✔ Validar manual</button>

<!-- 🔹 ABRIR CÂMERA -->
<button onclick="startCamera()">📷 Escanear QR</button>

<div id="reader"></div>

<div id="box"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwxok7oB1YSPcT0W0EUVwv0S8Z0jGqSEOOZywAN2tcFjhetV3BdXe4dw1BwWBZvrAtjuw/exec";

function mostrar(msg){
document.getElementById("box").innerHTML = msg;
}

// ======================
// MANUAL
// ======================
function validarManual(){

const code = document.getElementById("codigo").value;

validar(code);

}

// ======================
// CÂMERA
// ======================
function startCamera(){

document.getElementById("reader").style.display = "block";

const qr = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

let cameraId = null;

// 🔥 procurar câmera traseira
devices.forEach(device => {
  if (
    device.label.toLowerCase().includes("back") ||
    device.label.toLowerCase().includes("traseira") ||
    device.label.toLowerCase().includes("environment")
  ) {
    cameraId = device.id;
  }
});

// fallback
if (!cameraId) {
  cameraId = devices[0].id;
}

qr.start(
cameraId,
{
fps:10,
qrbox:250
},
(text) => {

qr.stop();

document.getElementById("codigo").value = text;

validar(text);

}

);

});

}

// ======================
// CHAMADA API
// ======================
function validar(code){

mostrar("⏳ Verificando...");

const url = API + "?codigo=" + encodeURIComponent(code);

fetch(url)
.then(response => response.text())
.then(text => {

console.log(text);

let res;

try {
res = JSON.parse(text);
} catch (e) {
mostrar("❌ Resposta inválida do servidor");
return;
}

if(res.status === "OK"){
mostrar("🟢 LIBERADO<br>" + res.nome);

} else if(res.status === "NEGADO"){
mostrar("🔴 JÁ ENTROU");

} else {
mostrar("❌ INVÁLIDO");
}

})
.catch(err => {
mostrar("❌ Erro de conexão com servidor");
console.log(err);
});

}

</script>

</body>
</html>
